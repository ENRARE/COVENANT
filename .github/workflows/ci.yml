name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install pinned Solidity dependencies
        run: forge install --no-git --shallow openzeppelin-contracts=OpenZeppelin/openzeppelin-contracts@tag=v5.6.1 forge-std=foundry-rs/forge-std@tag=v1.9.7

      - name: Validate formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test TypeScript
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Test Foundry package
        run: pnpm test:contracts

      - name: Reject non-example environment files
        run: pnpm check:env-files

      - name: Scan repository for credentials
        run: pnpm scan:secrets

  constraints:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject non-example environment files
        run: node scripts/check-env-files.mjs

      - name: Scan repository for credentials
        run: node scripts/scan-secrets.mjs
