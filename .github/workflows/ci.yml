name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 11.7.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1

      - name: Install pinned Solidity dependencies
        run: pnpm install:contracts:deps

      - name: Verify Solidity dependency commits
        run: pnpm verify:contracts:deps

      - name: Verify required COV-002 files
        run: pnpm verify:cov002-files

      - name: Validate formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test TypeScript
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Test Foundry package
        run: pnpm test:contracts

      - name: Reject non-example environment files
        run: pnpm check:env-files

      - name: Scan repository for credentials
        run: pnpm scan:secrets

  constraints:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Reject non-example environment files
        run: node scripts/check-env-files.mjs

      - name: Scan repository for credentials
        run: node scripts/scan-secrets.mjs
